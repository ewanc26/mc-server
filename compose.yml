# Fully Dynamic Minecraft Server Configuration
# All values are controlled by environment variables with sensible fallbacks
# Run: ./scripts/setup_master.sh for automatic configuration
# Or: ./scripts/auto_configure.sh to reconfigure for a different Minecraft version

# The setup script automatically selects:
# - Optimal Java version based on Minecraft version
# - Compatible plugin versions
# - Optimized JVM flags for the selected Java version

services:
  mc:
    # Optimized for arm64
    image: ${MC_IMAGE:-itzg/minecraft-server:java21}
    container_name: ${MC_CONTAINER_NAME:-mc}
    tty: true
    stdin_open: true
    restart: ${MC_RESTART_POLICY:-unless-stopped}
    
    # Local-only — playit.gg handles external ingress
    ports:
      - "127.0.0.1:${MC_SERVER_PORT:-25565}:25565"
      - "127.0.0.1:${MC_RCON_PORT:-25575}:25575"
      - "127.0.0.1:${MC_VOICE_PORT:-24454}:24454/udp"
    
    # Optimized memory limits (6GB)
    deploy:
      resources:
        limits:
          cpus: '${MC_CPU_LIMIT:-2.0}'
          memory: 6G
        reservations:
          cpus: '${MC_CPU_RESERVE:-0.5}'
          memory: 2G
    
    environment:
      # Console Access
      CREATE_CONSOLE_IN_PIPE: "true"
      
      # Server Type and Version
      EULA: "${MC_EULA:-TRUE}"
      TYPE: "${MC_TYPE:-PAPER}"
      # Minecraft version (auto-configured by setup script)
      VERSION: "${MC_VERSION:?Minecraft version not set. Run ./scripts/auto_configure.sh}"
      
      # Dynamic Memory Configuration (Optimized for 6GB total)
      INIT_MEMORY: "4G"
      MAX_MEMORY: "6G"
      
      # JVM Optimization (Aikar's optimized flags)
      USE_AIKAR_FLAGS: "true"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1 -Dusing.aikars.flags=https://mcflags.emc.gs -Daikar.new.flags=true"
      
      # Server Identity
      SERVER_NAME: "${MC_SERVER_NAME:-Ewan's Minecraft Server}"
      MOTD: "${MC_MOTD:-A small private server for friends}"
      
      # Server Settings
      DIFFICULTY: "${MC_DIFFICULTY:-easy}"
      DIFFICULTY_LOCK: "${MC_DIFFICULTY_LOCK:-false}"
      GAMEMODE: "${MC_GAMEMODE:-survival}"
      FORCE_GAMEMODE: "${MC_FORCE_GAMEMODE:-false}"
      HARDCORE: "${MC_HARDCORE:-false}"
      PVP: "${MC_PVP:-false}"
      ONLINE_MODE: "${MC_ONLINE_MODE:-true}"
      
      # Player Management
      MAX_PLAYERS: "${MC_MAX_PLAYERS:-6}"
      PLAYER_IDLE_TIMEOUT: "${MC_IDLE_TIMEOUT:-5}"
      ENABLE_WHITELIST: "${MC_ENABLE_WHITELIST:-true}"
      ENFORCE_WHITELIST: "${MC_ENABLE_WHITELIST:-true}"
      WHITELIST: "${MC_WHITELIST:-424cd779-3028-42b2-bbe0-9d140ded1e7e}"
      OPS: "${MC_OPS:-252bd633-504d-439b-8a5a-d99283f4b5a9}"
      
      # Performance Settings
      VIEW_DISTANCE: "${MC_VIEW_DISTANCE:-4}"
      SIMULATION_DISTANCE: "${MC_SIMULATION_DISTANCE:-3}"
      ENTITY_BROADCAST_RANGE_PERCENTAGE: "${MC_ENTITY_BROADCAST:-65}"
      MAX_TICK_TIME: "${MC_MAX_TICK_TIME:-15000}"
      MAX_WORLD_SIZE: "${MC_MAX_WORLD_SIZE:-10000}"
      NETWORK_COMPRESSION_THRESHOLD: "${MC_NETWORK_COMPRESSION:-128}"
      
      # World Settings
      LEVEL: "${MC_LEVEL_NAME:-world}"
      SEED: "${MC_LEVEL_SEED:-}"
      LEVEL_TYPE: "${MC_LEVEL_TYPE:-minecraft:normal}"
      GENERATOR_SETTINGS: "${MC_GENERATOR_SETTINGS:-}"
      GENERATE_STRUCTURES: "${MC_GENERATE_STRUCTURES:-true}"
      ALLOW_NETHER: "${MC_ALLOW_NETHER:-true}"
      
      # Spawn Settings
      SPAWN_PROTECTION: "${MC_SPAWN_PROTECTION:-4}"
      SPAWN_ANIMALS: "${MC_SPAWN_ANIMALS:-true}"
      SPAWN_MONSTERS: "${MC_SPAWN_MONSTERS:-true}"
      SPAWN_NPCS: "${MC_SPAWN_NPCS:-true}"
      
      # Server Management
      ENABLE_RCON: "${MC_ENABLE_RCON:-false}"
      RCON_PASSWORD: "${MC_RCON_PASSWORD:-}"
      ENABLE_QUERY: "${MC_ENABLE_QUERY:-false}"
      ENABLE_COMMAND_BLOCK: "${MC_ENABLE_COMMAND_BLOCK:-false}"
      
      # Logging
      ENABLE_ROLLING_LOGS: "${MC_ENABLE_ROLLING_LOGS:-true}"
      LOG_TIMESTAMP: "${MC_LOG_TIMESTAMP:-false}"
      
      # Timezone
      TZ: "${MC_TIMEZONE:-Europe/London}"
      
      # Chat Settings
      PREVIEWS_CHAT: "${MC_PREVIEWS_CHAT:-true}"
      ENFORCE_SECURE_PROFILE: "${MC_ENFORCE_SECURE_PROFILE:-false}"
      
      # Plugins (Auto-selected based on Minecraft version)
      # Configured via auto_configure.sh
      PLUGINS: ""
      
      # Modrinth projects — auto-resolves the correct build for the running
      # MC version/loader, so it doesn't go stale like pinned jar URLs do
      MODRINTH_PROJECTS: "${MC_MODRINTH_PROJECTS:-luckperms,simple-voice-chat}"
      
      # Spiget Resources
      SPIGET_RESOURCES: "${MC_SPIGET_RESOURCES:-1997}"
      
      # Paper Global Configuration
      PAPER_GLOBAL_CONFIG: |
        async-chunks:
          threads: ${MC_ASYNC_CHUNK_THREADS:-1}
        chunk-loading:
          max-concurrent-sends: ${MC_CHUNK_MAX_CONCURRENT_SENDS:-1}
          target-player-chunk-send-rate: ${MC_CHUNK_SEND_RATE:-30.0}
          autoconfig-send-distance: ${MC_CHUNK_AUTOCONFIG:-true}
          enable-frustum-priority: ${MC_CHUNK_FRUSTUM:-true}
        packet-limiter:
          all-packets:
            interval: ${MC_PACKET_INTERVAL:-5.0}
            max-packet-rate: ${MC_PACKET_RATE:-500.0}
        unsupported-settings:
          allow-permanent-block-break-exploits: ${MC_ALLOW_BREAK_EXPLOITS:-true}
          allow-piston-duplication: ${MC_ALLOW_PISTON_DUPE:-false}
      
      # Paper World Configuration
      PAPER_WORLD_CONFIG: |
        entities:
          spawning:
            all-chunks-are-slime-chunks: false
            per-player-mob-spawns: true
            spawn-limits:
              ambient: ${MC_SPAWN_AMBIENT:-8}
              axolotls: ${MC_SPAWN_AXOLOTLS:-3}
              creature: ${MC_SPAWN_CREATURE:-5}
              monster: ${MC_SPAWN_MONSTER:-40}
              underground_water_creature: ${MC_SPAWN_UNDERGROUND_WATER:-3}
              water_ambient: ${MC_SPAWN_WATER_AMBIENT:-15}
              water_creature: ${MC_SPAWN_WATER_CREATURE:-3}
            despawn-ranges:
              ambient:
                hard: ${MC_DESPAWN_AMBIENT_HARD:-72}
                soft: ${MC_DESPAWN_AMBIENT_SOFT:-30}
              creature:
                hard: ${MC_DESPAWN_CREATURE_HARD:-72}
                soft: ${MC_DESPAWN_CREATURE_SOFT:-30}
              monster:
                hard: ${MC_DESPAWN_MONSTER_HARD:-72}
                soft: ${MC_DESPAWN_MONSTER_SOFT:-30}
          behavior:
            baby-zombie-movement-modifier: ${MC_BABY_ZOMBIE_SPEED:-0.4}
            zombie-aggressive-towards-villager: ${MC_ZOMBIE_ATTACK_VILLAGER:-false}
            phantoms-only-attack-insomniacs: ${MC_PHANTOM_INSOMNIA_ONLY:-true}
        chunks:
          delay-chunk-unloads-by: ${MC_CHUNK_UNLOAD_DELAY:-10s}
          entity-per-chunk-save-limit:
            arrow: ${MC_ENTITY_LIMIT_ARROW:-8}
            experience_orb: ${MC_ENTITY_LIMIT_XP:-12}
            firework_rocket: ${MC_ENTITY_LIMIT_FIREWORK:-4}
          max-auto-save-chunks-per-tick: ${MC_AUTOSAVE_CHUNKS:-8}
          prevent-moving-into-unloaded-chunks: ${MC_PREVENT_UNLOADED_MOVE:-true}
        tick-rates:
          sensor:
            villager:
              secondarypoisensor: ${MC_VILLAGER_POI_SENSOR:-120}
              nearestbedsensor: ${MC_VILLAGER_BED_SENSOR:-100}
          behavior:
            villager:
              validatenearbypoi: ${MC_VILLAGER_POI_VALIDATE:-120}
          container-update: ${MC_CONTAINER_UPDATE:-3}
          grass-spread: ${MC_GRASS_SPREAD:-4}
          mob-spawner: ${MC_MOB_SPAWNER_TICK:-2}
        misc:
          disable-end-credits: ${MC_DISABLE_END_CREDITS:-true}
          light-queue-size: ${MC_LIGHT_QUEUE:-10}
          max-leash-distance: ${MC_MAX_LEASH:-8.0}
          redstone-implementation: ${MC_REDSTONE_IMPL:-ALTERNATE_CURRENT}
          update-pathfinding-on-block-update: ${MC_UPDATE_PATHFINDING:-false}
        scoreboards:
          track-plugin-scoreboards: ${MC_TRACK_SCOREBOARDS:-false}
      
      # Spigot Configuration
      SPIGOT_WORLD_CONFIG: |
        growth:
          cactus-modifier: ${MC_GROWTH_CACTUS:-150}
          cane-modifier: ${MC_GROWTH_CANE:-150}
          melon-modifier: ${MC_GROWTH_MELON:-150}
          pumpkin-modifier: ${MC_GROWTH_PUMPKIN:-150}
          sapling-modifier: ${MC_GROWTH_SAPLING:-150}
          wheat-modifier: ${MC_GROWTH_WHEAT:-150}
          netherwart-modifier: ${MC_GROWTH_NETHERWART:-150}
          vine-modifier: ${MC_GROWTH_VINE:-150}
          cocoa-modifier: ${MC_GROWTH_COCOA:-150}
          bamboo-modifier: ${MC_GROWTH_BAMBOO:-150}
          sweetberry-modifier: ${MC_GROWTH_SWEETBERRY:-150}
          kelp-modifier: ${MC_GROWTH_KELP:-150}
        entity-activation-range:
          animals: ${MC_ACTIVATION_ANIMALS:-16}
          monsters: ${MC_ACTIVATION_MONSTERS:-24}
          raiders: ${MC_ACTIVATION_RAIDERS:-32}
          misc: ${MC_ACTIVATION_MISC:-8}
          water: ${MC_ACTIVATION_WATER:-8}
          villagers: ${MC_ACTIVATION_VILLAGERS:-16}
          flying-monsters: ${MC_ACTIVATION_FLYING:-32}
        entity-tracking-range:
          players: ${MC_TRACKING_PLAYERS:-32}
          animals: ${MC_TRACKING_ANIMALS:-32}
          monsters: ${MC_TRACKING_MONSTERS:-32}
          misc: ${MC_TRACKING_MISC:-16}
          other: ${MC_TRACKING_OTHER:-32}
        ticks-per:
          hopper-transfer: ${MC_HOPPER_TRANSFER:-12}
          hopper-check: ${MC_HOPPER_CHECK:-2}
        hopper-amount: ${MC_HOPPER_AMOUNT:-1}
        max-tnt-per-tick: ${MC_MAX_TNT:-50}
        max-tick-time:
          tile: ${MC_TILE_TICK_TIME:-25}
          entity: ${MC_ENTITY_TICK_TIME:-25}
        merge-radius:
          item: ${MC_MERGE_ITEM:-3.5}
          exp: ${MC_MERGE_EXP:-4.0}
        mob-spawn-range: ${MC_MOB_SPAWN_RANGE:-4}
        nerf-spawner-mobs: ${MC_NERF_SPAWNER:-true}
        view-distance: ${MC_VIEW_DISTANCE:-4}
        simulation-distance: ${MC_SIMULATION_DISTANCE:-3}
        item-despawn-rate: ${MC_ITEM_DESPAWN:-4000}
        arrow-despawn-rate: ${MC_ARROW_DESPAWN:-600}
        trident-despawn-rate: ${MC_TRIDENT_DESPAWN:-600}
        zombie-aggressive-towards-villager: ${MC_ZOMBIE_AGGRO_VILLAGER:-false}
        wither-spawn-sound-radius: ${MC_WITHER_SOUND_RADIUS:-0}
        hanging-tick-frequency: ${MC_HANGING_TICK:-200}
      
      # Bukkit Configuration
      BUKKIT_CONFIG: |
        spawn-limits:
          monsters: ${MC_BUKKIT_SPAWN_MONSTERS:-40}
          animals: ${MC_BUKKIT_SPAWN_ANIMALS:-8}
          water-animals: ${MC_BUKKIT_SPAWN_WATER_ANIMALS:-3}
          water-ambient: ${MC_BUKKIT_SPAWN_WATER_AMBIENT:-15}
          water-underground-creature: ${MC_BUKKIT_SPAWN_UNDERGROUND:-3}
          axolotls: ${MC_BUKKIT_SPAWN_AXOLOTLS:-3}
          ambient: ${MC_BUKKIT_SPAWN_AMBIENT:-8}
        chunk-gc:
          period-in-ticks: ${MC_CHUNK_GC_PERIOD:-400}
        ticks-per:
          animal-spawns: ${MC_ANIMAL_SPAWN_TICKS:-400}
          monster-spawns: ${MC_MONSTER_SPAWN_TICKS:-5}
          water-spawns: ${MC_WATER_SPAWN_TICKS:-11}
          water-ambient-spawns: ${MC_WATER_AMBIENT_SPAWN_TICKS:-21}
          water-underground-creature-spawns: ${MC_UNDERGROUND_SPAWN_TICKS:-11}
          axolotl-spawns: ${MC_AXOLOTL_SPAWN_TICKS:-11}
          ambient-spawns: ${MC_AMBIENT_SPAWN_TICKS:-31}
          autosave: ${MC_AUTOSAVE_TICKS:-12000}
        aliases: now-in-commands.yml
    
    volumes:
      - "${MC_DATA_DIR:-/Volumes/Storage/Server/MC/data}:/data"
      - "${MC_BACKUP_DIR:-/Volumes/Storage/Server/MC/backups}:/backups"
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "mc-health"]
      interval: ${MC_HEALTH_INTERVAL:-1m}
      timeout: ${MC_HEALTH_TIMEOUT:-10s}
      retries: ${MC_HEALTH_RETRIES:-3}
      start_period: ${MC_HEALTH_START_PERIOD:-5m}
    
    # Labels for organization
    labels:
      - "com.minecraft.server=true"
      - "com.minecraft.type=${MC_TYPE:-PAPER}"
      - "com.minecraft.version=${MC_VERSION:-1.21.1}"
      - "com.minecraft.optimization=${MC_OPTIMIZATION_TIER:-auto}"

  backups:
    image: itzg/mc-backup
    container_name: mc-backup
    environment:
      BACKUP_INTERVAL: "6h"
      INITIAL_DELAY: "2m"
      PRUNE_BACKUPS_DAYS: 7
    volumes:
      - "${MC_DATA_DIR:-/Volumes/Storage/Server/MC/data}:/data:ro"
      - "${MC_BACKUP_DIR:-/Volumes/Storage/Server/MC/backups}:/backups"
    restart: unless-stopped
    depends_on:
      - mc

  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    container_name: playit-agent
    network_mode: host
    environment:
      - SECRET_KEY=${PLAYIT_SECRET}
    volumes:
      - ./playit:/etc/playit
    restart: unless-stopped
    depends_on:
      - mc
